spring:
  application:
    name: innocence-server
  profiles:
    active: local

server:
  port: 8080

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.innocence.server
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
